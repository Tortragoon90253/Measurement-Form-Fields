<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Option 3: "BT" monogram with pulse line -->
  <rect width="32" height="32" rx="8" fill="#2E86AB"/>
  <!-- Pulse / heartbeat line behind text -->
  <polyline points="2,18 6,18 8,12 10,22 12,10 14,20 16,18 30,18"
    stroke="#F6AE2D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <!-- BT text -->
  <text x="5" y="15" font-family="Arial Black, sans-serif" font-size="11" font-weight="900"
    fill="white" letter-spacing="-0.5">BT</text>
</svg>
